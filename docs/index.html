<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTC Student Activities</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4efe3; color: #1f1f1a; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 18px 40px; }
    .hero { background: linear-gradient(135deg, #f2c230 0%, #f6db79 100%); border-radius: 24px; padding: 28px 24px; }
    h1 { margin: 0 0 10px; }
    .grid { display: grid; gap: 16px; margin-top: 22px; }
    .card { background: #fffaf2; border: 1px solid #d8cfbd; border-radius: 18px; padding: 18px; }
    .card h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .card p { margin: 0 0 12px; line-height: 1.45; }
    .card a { display: inline-block; padding: 10px 14px; border-radius: 999px; background: #f2c230; color: #1f1f1a; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>MTC Student Activities</h1>
      <p>Simple browser-based learning activities for students.</p>
    </section>
    <div class="grid">
      <article class="card">
        <h2>Google Tasks Practice</h2>
        <p>Learn how to open Google Tasks, create tasks, add details, mark tasks complete, and check understanding with a short quiz.</p>
        <a href="./google-tasks-practice/">Open activity</a>
      </article>
    </div>
  </div>
</body>
</html>
